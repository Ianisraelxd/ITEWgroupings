<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student</title>

<style>
    body{
        font-family: Arial;
        margin:40px;
    }

    input{
        padding:8px;
        margin:5px;
    }

    button{
        padding:8px 12px;
        cursor:pointer;
    }

    table{
        border-collapse: collapse;
        width:100%;
        margin-top:20px;
    }

    table, th, td{
        border:1px solid black;
        padding:10px;
        text-align:center;
    }
</style>
</head>

<body>

<h2>Student List</h2>

<!-- INPUT FORM -->
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="course" placeholder="Course">
<input type="number" id="age" placeholder="Age">

<button id="addBtn">Add Student</button>
<button id="updateBtn">Update</button>

<!-- TABLE -->
<table>
<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Course</th>
    <th>Age</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>
</table>

<script>

let selectedIndex = -1;

/* =========================
   EVENT LISTENERS
========================= */

document.getElementById("addBtn")
    .addEventListener("click", addStudent);

document.getElementById("updateBtn")
    .addEventListener("click", updateStudent);

window.addEventListener("load", displayStudents);


/* =========================
   STORAGE FUNCTIONS
========================= */

function getStudents(){
    return JSON.parse(localStorage.getItem("students")) || [];
}

function saveStudents(data){
    localStorage.setItem("students", JSON.stringify(data));
}


/* =========================
   CREATE
========================= */

function addStudent(){

    const name = document.getElementById("name").value.trim();
    const course = document.getElementById("course").value.trim();
    const age = document.getElementById("age").value.trim();

    if(!name || !course || !age){
        alert("Fill all fields!");
        return;
    }

    const students = getStudents();

    students.push({
        id: Date.now(),
        name,
        course,
        age
    });

    saveStudents(students);

    clearInputs();
    displayStudents();
}


/* =========================
   READ / DISPLAY
========================= */

function displayStudents(){

    const table = document.getElementById("studentTable");
    table.innerHTML = "";

    const students = getStudents();

    students.forEach((student, index)=>{

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${student.id}</td>
            <td>${student.name}</td>
            <td>${student.course}</td>
            <td>${student.age}</td>
            <td>
                <button class="editBtn">Edit</button>
                <button class="deleteBtn">Delete</button>
            </td>
        `;

        // EDIT button listener
        row.querySelector(".editBtn")
            .addEventListener("click", () => editStudent(index));

        // DELETE button listener
        row.querySelector(".deleteBtn")
            .addEventListener("click", () => deleteStudent(index));

        table.appendChild(row);
    });
}


/* =========================
   EDIT
========================= */

function editStudent(index){

    const students = getStudents();

    document.getElementById("name").value = students[index].name;
    document.getElementById("course").value = students[index].course;
    document.getElementById("age").value = students[index].age;

    selectedIndex = index;
}


/* =========================
   UPDATE
========================= */

function updateStudent(){

    if(selectedIndex === -1){
        alert("Select student first!");
        return;
    }

    const students = getStudents();

    students[selectedIndex].name =
        document.getElementById("name").value;

    students[selectedIndex].course =
        document.getElementById("course").value;

    students[selectedIndex].age =
        document.getElementById("age").value;

    saveStudents(students);

    selectedIndex = -1;
    clearInputs();
    displayStudents();
}


/* =========================
   DELETE
========================= */

function deleteStudent(index){

    const students = getStudents();
    students.splice(index,1);

    saveStudents(students);
    displayStudents();
}


/* =========================
   CLEAR INPUTS
========================= */

function clearInputs(){
    document.getElementById("name").value = "";
    document.getElementById("course").value = "";
    document.getElementById("age").value = "";
}

</script>
