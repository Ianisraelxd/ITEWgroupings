<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatapatanEagerGNC LMS</title>

    <link rel="stylesheet" href="../style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>



</head>

<body>

    <nav>
        <h3>KatapatanEagerGNC</h3>
        <div class="nav-links">
            <a href="about.html">About Us</a>
        </div>
    </nav>

    <div class="container">

        <div class="sideImage"></div>

        <main>

            <div class="login-card">

                <h1 id="formTitle">Login</h1>


                <!-- LOGIN -->

                <div id="loginForm">

                    <select id="loginRole" class="role-select">
                        <option value="" disabled selected>Select Role</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Administrator">Administrator</option>
                    </select>

                    <input type="text" id="loginId" placeholder="User ID / Account Number">

                    <input type="password" id="loginPassword" placeholder="Password">

                    <p id="loginError" style="color:red;display:none;"></p>

                    <button id="loginButton">Login</button>

                </div>


                <!-- SIGNUP -->

                <div id="signupForm" class="signup-fields">

                    <input type="text" id="signupId" placeholder="Account Number">

                    <input type="text" id="signupFirstName" placeholder="First Name">

                    <input type="text" id="signupLastName" placeholder="Last Name">

                    <input type="password" id="signupPassword" placeholder="Password">

                    <select id="signupRole" class="role-select">
                        <option value="" disabled selected>Select Role</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Administrator">Administrator</option>
                    </select>

                    <p style="font-size:0.85rem;text-align:center;color:#666;">
                        Subjects will be assigned later inside the dashboard.
                    </p>

                    <p id="signupError" style="color:red;display:none;"></p>

                    <button id="signupButton">Create Account</button>

                </div>


                <div class="toggle-container">
                    <button class="toggle-btn" id="toggleBtn">
                        Don't have an account? Sign Up
                    </button>
                </div>

            </div>

        </main>

    </div>


    <script>

        let isLogin = true;

        $(document).ready(function () {

            let users = JSON.parse(localStorage.getItem("users") || "{}")

            if (!users["ADMIN001"]) {

                users["ADMIN001"] = {
                    accountId: "ADMIN001",
                    firstName: "Admin",
                    lastName: "User",
                    fullName: "Admin User",
                    password: "admin123",
                    role: "Administrator",
                    subjects: [],
                    createdAt: new Date().toISOString()
                }

                localStorage.setItem("users", JSON.stringify(users))

                console.log("Default admin created → ADMIN001 / admin123")

            }

        })


        $("#toggleBtn").click(function () {

            isLogin = !isLogin

            if (isLogin) {

                $("#formTitle").text("Login")

                $("#loginForm").show()

                $("#signupForm").removeClass("active")

                $("#toggleBtn").text("Don't have an account? Sign Up")

            } else {

                $("#formTitle").text("Sign Up")

                $("#loginForm").hide()

                $("#signupForm").addClass("active")

                $("#toggleBtn").text("Already have an account? Login")

            }

        })

        $("#loginButton").click(function () {

            let id = $("#loginId").val().trim()

            let pass = $("#loginPassword").val().trim()

            let role = $("#loginRole").val()

            if (!id || !pass || !role) {

                $("#loginError").text("Please fill all fields").show()

                return

            }

            let users = JSON.parse(localStorage.getItem("users") || "{}")

            let user = users[id]

            if (!user) {

                $("#loginError").text("Account not found").show()

                return

            }

            if (user.password !== pass) {

                $("#loginError").text("Incorrect password").show()

                return

            }

            if (user.role !== role) {

                $("#loginError").text("Role mismatch").show()

                return

            }

            sessionStorage.setItem("currentUser", JSON.stringify(user))


            if (role === "Administrator") window.location.href = "admin.html"

            if (role === "Teacher") window.location.href = "teacher.html"

            if (role === "Student") window.location.href = "student.html"

        })

        $("#loginPassword").keypress(function (e) {

            if (e.which === 13) {

                $("#loginButton").click()

            }

        })

        $("#signupButton").click(function () {

            let id = $("#signupId").val().trim()

            let fname = $("#signupFirstName").val().trim()

            let lname = $("#signupLastName").val().trim()

            let pass = $("#signupPassword").val().trim()

            let role = $("#signupRole").val()

            if (!id || !fname || !lname || !pass || !role) {

                $("#signupError").text("Please complete all fields").show()

                return

            }

            let users = JSON.parse(localStorage.getItem("users") || "{}")

            if (users[id]) {

                $("#signupError").text("Account already exists").show()

                return

            }

            users[id] = {

                accountId: id,
                firstName: fname,
                lastName: lname,
                fullName: fname + " " + lname,
                password: pass,
                role: role,
                subjects: [],
                createdAt: new Date().toISOString()

            }

            localStorage.setItem("users", JSON.stringify(users))


            alert("Account created successfully")


            $("#signupForm input").val("")

            $("#signupRole").val("")

            $("#signupError").hide()


            $("#toggleBtn").click()

        })

    </script>

</body>

</html>
