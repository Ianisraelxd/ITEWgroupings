<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

<link rel="stylesheet" href="../style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../Scripts/main.js"></script>
    <script src="../Scripts/data.js"></script>
    <script src="../Scripts/user.js"></script>
    <script src="../Scripts/student.js"></script>
</head>

<body>
<nav>
    <h3>KatapatanEagerGNC</h3>
    <a href="about.html">About</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Student Panel</h3>
            <span class="welcome-user"></span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="active">My Grades</a>
            <a href="#">Attendance</a>
        </nav>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>My Grades</h1>
            <input type="text" id="studentSearch" placeholder="Search subject">
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Subjects & Grades</h2>
                <span id="avgGrade">Average: --</span>
            </div>
            <div class="table-container">
                <table id="gradesTable" border="1" style="width:100%; border-collapse: collapse; text-align:center;">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Prelim</th>
                            <th>Midterm</th>
                            <th>Finals</th>
                            <th>Final Avg</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<script>
$(function () {
    if (!checkRole("Student")) return;
    loadStudentData();
    $("#studentSearch").on("input", function () {
        let value = $(this).val().toLowerCase();
        $("#gradesTable tbody tr").filter(function () {
            $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
        });
    });
});

function loadStudentData() {
    const user = getCurrentUser();
    let grades = user.grades || {};
    displayGrades(grades);
    updateAverage(grades);
}

function displayGrades(grades) {
    let tbody = $("#gradesTable tbody");
    tbody.empty();
    Object.keys(grades).forEach(subject => {
        let g = grades[subject] || { prelim: null, midterm: null, finals: null };
        let prelim = g.prelim != null ? g.prelim : "--";
        let midterm = g.midterm != null ? g.midterm : "--";
        let finals = g.finals != null ? g.finals : "--";

        let numericGrades = [g.prelim, g.midterm, g.finals].filter(x => x != null);
        let finalAvg = numericGrades.length ? (numericGrades.reduce((a,b)=>a+b,0)/numericGrades.length).toFixed(2) : "--";
        let status = finalAvg === "--" ? "--" : (finalAvg >= 60 ? "Passed" : "Failed");

        tbody.append(`<tr>
<td>${subject}</td>
<td>${prelim}</td>
<td>${midterm}</td>
<td>${finals}</td>
<td>${finalAvg}</td>
<td>${status}</td>
</tr>`);
    });
}

function updateAverage(grades) {
    let numericGrades = [];
    Object.values(grades).forEach(g => {
        [g.prelim, g.midterm, g.finals].forEach(v => { if (v != null) numericGrades.push(v); });
    });
    if (!numericGrades.length) {
        $("#avgGrade").text("Average: -- (Status: --)");
        return;
    }
    let avg = (numericGrades.reduce((a,b)=>a+b,0)/numericGrades.length).toFixed(2);
    let status = avg >= 60 ? "Passed" : "Failed";
    $("#avgGrade").text(`Average: ${avg} (Status: ${status})`);
}
</script>

</body>
</html>
