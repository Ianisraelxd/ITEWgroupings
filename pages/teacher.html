<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>

<link rel="stylesheet" href="../style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../Scripts/main.js"></script>
    <script src="../Scripts/data.js"></script>
    <script src="../Scripts/user.js"></script>
    <script src="../Scripts/teacher.js"></script>
</head>

<body>

    <nav>
        <h3>KatapatanEagerGNC</h3>
        <a href="about.html">About</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>

    <div class="admin-layout">

        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Teacher Panel</h3>
                <span class="welcome-user"></span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Sections</a>
                <a href="#">Grades</a>
            </nav>
        </aside>

        <main class="admin-main">

            <div class="admin-header">
                <h1>Teacher Dashboard</h1>
                <button id="addSubjectBtn">Add Subject</button>
                <input type="text" id="searchInput" placeholder="Search students">
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Input Grades</h2>
                </div>
                <div class="card-body">
                    <select id="studentSelect"></select>
                    <select id="subjectSelect"></select>
                    <select id="periodSelect">
                        <option value="prelim">Prelim</option>
                        <option value="midterm">Midterm</option>
                        <option value="finals">Finals</option>
                    </select>
                    <input type="number" id="gradeInput" placeholder="Grade">
                    <button id="addGradeBtn">Add Grade</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Grades Overview</h2>
                </div>
                <div class="table-container">
                    <table id="gradesTable" border="1"
                        style="width:100%; border-collapse: collapse; text-align:center;">
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Subject</th>
                                <th>Prelim</th>
                                <th>Midterm</th>
                                <th>Finals</th>
                                <th>Final Avg</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        $(function () {
            if (!checkRole("Teacher")) return;

            loadTeacherData();
            $("#addGradeBtn").click(addGrade);
            $("#addSubjectBtn").click(addSubject);
        });

        function loadTeacherData() {
            populateStudents();
            populateSubjects();
            refreshGradesTable();
        }

        function populateStudents() {
            let users = JSON.parse(localStorage.getItem("users") || "{}");
            let students = Object.values(users).filter(u => u.role === "Student");
            let select = $("#studentSelect");
            select.empty();
            students.forEach(s => select.append(`<option value="${s.accountId}">${s.firstName} ${s.lastName}</option>`));
        }

        function populateSubjects() {
            let user = getCurrentUser();
            let subjects = user.subjects || [];
            let select = $("#subjectSelect");
            select.empty();
            subjects.forEach(sub => select.append(`<option value="${sub}">${sub}</option>`));
        }

        function addSubject() {
            let subject = prompt("Enter subject");
            if (!subject) return;
            subject = subject.trim();
            if (subject === "") return;

            let users = JSON.parse(localStorage.getItem("users") || "{}");
            let currentUser = getCurrentUser();
            currentUser.subjects = currentUser.subjects || [];
            if (currentUser.subjects.includes(subject)) {
                alert("Subject already exists");
                return;
            }
            currentUser.subjects.push(subject);
            users[currentUser.accountId] = currentUser;
            localStorage.setItem("users", JSON.stringify(users));
            sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
            populateSubjects();
            alert("Subject added successfully");
        }

        function addGrade() {
            let studentId = $("#studentSelect").val();
            let subject = $("#subjectSelect").val();
            let period = $("#periodSelect").val();
            let grade = parseFloat($("#gradeInput").val());

            if (!studentId || !subject || !period || isNaN(grade) || grade < 0 || grade > 100) {
                alert("Please fill all fields correctly (Grade must be 0-100)");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users") || "{}");
            let student = users[studentId];
            student.grades = student.grades || {};
            student.grades[subject] = student.grades[subject] || { prelim: null, midterm: null, finals: null };
            student.grades[subject][period] = grade;
            users[studentId] = student;
            localStorage.setItem("users", JSON.stringify(users));

            $("#gradeInput").val("");
            alert("Grade added successfully");
            refreshGradesTable();
        }

        function refreshGradesTable() {
            let users = JSON.parse(localStorage.getItem("users") || "{}");
            let tbody = $("#gradesTable tbody");
            tbody.empty();
            Object.values(users).filter(u => u.role === "Student").forEach(student => {
                let grades = student.grades || {};
                Object.keys(grades).forEach(subject => {
                    let g = grades[subject];
                    let prelim = g.prelim != null ? g.prelim : "--";
                    let midterm = g.midterm != null ? g.midterm : "--";
                    let finals = g.finals != null ? g.finals : "--";

                    let numericGrades = [g.prelim, g.midterm, g.finals].filter(x => x != null);
                    let finalAvg = numericGrades.length ? (numericGrades.reduce((a, b) => a + b, 0) / numericGrades.length).toFixed(2) : "--";
                    let status = finalAvg === "--" ? "--" : (finalAvg >= 60 ? "Passed" : "Failed");

                    tbody.append(`<tr>
<td>${student.firstName} ${student.lastName}</td>
<td>${subject}</td>
<td>${prelim}</td>
<td>${midterm}</td>
<td>${finals}</td>
<td>${finalAvg}</td>
<td>${status}</td>
</tr>`);
                });
            });
        }
    </script>

</body>

</html>
